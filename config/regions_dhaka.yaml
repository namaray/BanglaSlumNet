# Dhaka five-region benchmark — bounding boxes in WGS84 (lon_min, lat_min, lon_max, lat_max).
# ALL coordinates are TODO_VERIFY — verify visually in GEE before first export.
# Use the "Region preview on map" cell in BanglaSlumNet_Colab.ipynb for visual confirmation.

regions:
  korail:
    type: informal
    role: train_eval
    description: "Largest Dhaka slum, beside Gulshan lake"
    bbox:
      lon_min: 90.3980   # ESTIMATE — confirm on P1.3 map
      lat_min: 23.7800   # ESTIMATE
      lon_max: 90.4130   # ESTIMATE
      lat_max: 23.7940   # ESTIMATE
    notes: "Adjacent to Gulshan/Banani Lake; dense informal settlement (~1.5 km box)"

  bhashantek:
    type: informal
    role: train_eval
    description: "Government-resettlement + informal mix"
    bbox:
      lon_min: 90.3770   # ESTIMATE — confirm on P1.3 map
      lat_min: 23.8180   # ESTIMATE
      lon_max: 90.3920   # ESTIMATE
      lat_max: 23.8320   # ESTIMATE
    notes: "Near Mirpur/Cantonment; resettlement blocks + organic informal growth"

  karail_extension:
    type: informal
    role: train_eval
    description: "Periphery informal growth area"
    bbox:
      lon_min: 90.4080   # ESTIMATE — confirm on P1.3 map
      lat_min: 23.7850   # ESTIMATE
      lon_max: 90.4180   # ESTIMATE
      lat_max: 23.7930   # ESTIMATE
    notes: "East periphery of Korail toward Mohakhali; informal growth"

  old_dhaka:
    type: formal_dense
    role: train_eval
    description: "Dense pucca masonry — the discriminator-killer control region"
    bbox:
      lon_min: 90.3950   # ESTIMATE — confirm on P1.3 map
      lat_min: 23.7020   # ESTIMATE
      lon_max: 90.4180   # ESTIMATE
      lat_max: 23.7200   # ESTIMATE
    notes: "Historic brick core near the river; very high building density (~2.3 km box)"

  gulshan_baridhara:
    type: formal_dense
    role: train_eval
    description: "Affluent, dense, road-connected, bright at night"
    bbox:
      lon_min: 90.4100   # ESTIMATE — confirm on P1.3 map
      lat_min: 23.7850   # ESTIMATE
      lon_max: 90.4320   # ESTIMATE
      lat_max: 23.8080   # ESTIMATE
    notes: "Gulshan-2 + Baridhara; strong nighttime light; clear road grid (~2.5 km box)"

# Metadata
metadata:
  crs: EPSG:4326
  tile_size_m: 2560        # 256 px × 10 m/px
  target_resolution_m: 10  # Sentinel-2
  gram_resolution_m: 1.2   # ESRI z16 tiles for GRAM baseline only
