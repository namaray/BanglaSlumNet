  mirpur_beribadh:
    type: informal
    role: train_eval
    description: "Mirpur embankment (Beribadh) informal settlements"
    bbox:
      lon_min: 90.3350   # ESTIMATE — confirm on P1.3 map
      lat_min: 23.8015
      lon_max: 90.3650
      lat_max: 23.8285
    notes: "Embankment-side informal growth, NW Dhaka"

  dhanmondi:
    type: formal_dense
    role: train_eval
    description: "Dhanmondi — planned affluent residential (formal control)"
    bbox:
      lon_min: 90.3600   # ESTIMATE — confirm on P1.3 map
      lat_min: 23.7315
      lon_max: 90.3900
      lat_max: 23.7585
