      lon_min: 90.3500   # ESTIMATE — confirm on P1.3 map
      lat_min: 23.7015
      lon_max: 90.3800
      lat_max: 23.7285
    notes: "Major distinct informal settlement; geographically separate"

  kallyanpur:
    type: informal
    role: train_eval
    description: "Kallyanpur Pora Bosti (Mirpur) informal settlement"
    bbox:
      lon_min: 90.3430   # ESTIMATE — confirm on P1.3 map
      lat_min: 23.7815
      lon_max: 90.3730
      lat_max: 23.8085
    notes: "Mirpur-area informal settlement"

  hazaribagh:
    type: informal
    role: train_eval
    description: "Hazaribagh tannery-edge informal fabric"
    bbox:
      lon_min: 90.3500   # ESTIMATE — confirm on P1.3 map
      lat_min: 23.7215
